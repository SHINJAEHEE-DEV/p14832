server:
  port: 8080
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:h2:mem:db_test;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            scope: profile_nickname, profile_image
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            client-name: Google
            scope: profile
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            scope: profile_nickname, profile_image
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

custom:
  dev:
    cookieDomain: localhost
    frontUrl: "http://localhost:3000"
    backUrl: "http://localhost:8080"
  prod:
    cookieDomain: localhost
    frontUrl: "http://localhost:3000"
    backUrl: "http://localhost:8080"
  site:
    cookieDomain: "localhost"
    frontUrl: "http://localhost:3000"
    backUrl: "http://localhost:8080"
  jwt:
    secretKey: "test-secret-key-for-jwt-token-generation-in-tests"
  accessToken:
    expireSeconds: 3600
  notProdMembers:
    - username: "test-user"
      apiKey: "test-api-key"
      nickname: "Test User"
      profileImgUrl: "http://localhost:3000/test.jpg"
